<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OurDream · AI Companion</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ── HOME VIEW ─────────────────────────────────────────────────────────── -->
  <div id="homeView" class="view">
    <header class="home-header">
      <div class="home-logo">✦ OurDream</div>
      <button class="icon-btn" id="settingsBtn" title="设置">⚙</button>
    </header>

    <div class="home-hero">
      <div class="home-hero-title">遇见你的专属伴侣</div>
      <div class="home-hero-sub">AI 驱动 · 实时对话 · 情感陪伴</div>
    </div>

    <div class="home-filters">
      <button class="filter-chip active">✦ 全部</button>
      <button class="filter-chip">🌸 温柔系</button>
      <button class="filter-chip">⚡ 活力系</button>
      <button class="filter-chip">🌊 知性系</button>
      <button class="filter-chip">🌹 神秘系</button>
    </div>

    <div class="girl-grid" id="girlGrid"><!-- JS generated --></div>

    <div class="gen-notice hidden" id="genNotice">
      <span class="gen-dot"></span> 正在为你生成专属人像…
    </div>
  </div>

  <!-- ── CHAT VIEW ──────────────────────────────────────────────────────────── -->
  <div id="chatView" class="view hidden">
    <div class="chat-header">
      <button class="icon-btn" id="backBtn">←</button>

      <div class="hd-portrait-outer" id="chatExprWrap">
        <div class="hd-portrait-circle" id="chatPortraitCircle">
          <span class="p-emoji" id="chatPortraitEmoji"></span>
          <img  class="p-photo" id="chatPortraitPhoto" alt="">
        </div>
        <div class="expr-badge" id="chatExprBadge">😊</div>
      </div>

      <div class="chat-header-info">
        <div class="chat-name" id="chatName"></div>
        <div class="chat-online">在线</div>
      </div>

      <div class="chat-header-actions">
        <button class="icon-btn pos-rel" id="memoryBtn" title="记忆">🧠</button>
        <button class="icon-btn pos-rel" id="queueBtn" title="生成队列">
          ⚡<span id="queueBadge" class="queue-badge hidden">0</span>
        </button>
        <button class="call-start-btn" id="callBtn">📹 视频</button>
      </div>
    </div>

    <div class="messages" id="messages">
      <div class="day-divider">今天</div>
    </div>

    <div class="chat-composer">
      <button class="mic-btn" id="micBtn" title="语音输入">🎙</button>
      <input id="msgInput" type="text" placeholder="说点什么…" autocomplete="off">
      <button class="icon-btn compose-img-btn" id="genImgBtn" title="生成表情图片">📸</button>
      <button id="sendBtn">发送</button>
    </div>
  </div>

  <!-- ── VIDEO CALL VIEW ────────────────────────────────────────────────────── -->
  <div id="callView" class="view hidden">
    <div class="call-bg" id="callBg"></div>

    <video id="localVideo" class="local-video hidden" autoplay muted playsinline></video>

    <div class="call-metrics" id="callMetrics">
      <span class="metric-chip" id="metricConnect">⚡ —ms</span>
      <span class="metric-chip" id="metricReply">💬 —ms</span>
    </div>

    <div class="call-overlay">
      <div class="call-top-row">
        <div>
          <div class="call-char-name" id="callCharName"></div>
          <div class="call-status-badge" id="callStatusBadge">连接中…</div>
        </div>
        <div class="call-timer" id="callTimer">00:00</div>
      </div>

      <div class="call-portrait-outer" id="callExprWrap">
        <div class="call-portrait-circle" id="callPortraitCircle">
          <span class="p-emoji" id="callPortraitEmoji"></span>
          <img  class="p-photo" id="callPortraitPhoto" alt="">
          <div class="call-mouth" id="callMouth"></div>
        </div>
        <div class="call-speak-ring" id="callSpeakRing"></div>
        <div class="expr-badge large" id="callExprBadge">😊</div>
      </div>

      <div class="call-bottom-area">
        <div class="call-caption" id="callCaption"></div>
        <div class="call-waveform" id="callWaveform">
          <span></span><span></span><span></span><span></span><span></span>
          <span></span><span></span><span></span><span></span>
        </div>
        <div class="call-controls">
          <button class="ctrl-btn call-mic-btn" id="callMicBtn">🎙 说话</button>
          <button class="ctrl-btn end-btn" id="endCallBtn">挂断</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── SETTINGS MODAL ─────────────────────────────────────────────────────── -->
  <div id="settingsModal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <span>⚙ AI 后端设置</span>
        <button class="icon-btn" id="closeSettingsBtn">✕</button>
      </div>

      <div class="setting-section">
        <div class="setting-label">💬 对话 AI（vLLM / OpenAI 兼容）</div>
        <input class="setting-input" id="vllmUrl"   type="text" value="http://localhost:8000" placeholder="http://localhost:8000">
        <input class="setting-input" id="vllmModel" type="text" placeholder="模型名称（留空自动检测）">
        <div class="setting-row">
          <button class="test-btn"   id="vllmTestBtn">测试连接</button>
          <button class="toggle-btn off" id="vllmToggle">AI 已关闭</button>
        </div>
        <div class="setting-hint" id="vllmHint"></div>
      </div>

      <div class="setting-section">
        <div class="setting-label">🖼 人像生成（Stable Diffusion 后端）</div>
        <input class="setting-input" id="sdUrl" type="text" value="http://localhost:8100" placeholder="http://localhost:8100">
        <div class="setting-row">
          <button class="test-btn"  id="sdTestBtn">测试连接</button>
          <button class="toggle-btn off" id="sdToggle">图像已关闭</button>
        </div>
        <div class="setting-hint" id="sdHint">开启后将自动生成每位伴侣的真实人像</div>
      </div>

      <button class="danger-btn" id="clearCacheBtn">🗑 清除已缓存的人像</button>
    </div>
  </div>

  <!-- ── MEMORY DRAWER ──────────────────────────────────────────────────────── -->
  <div id="memoryDrawer" class="drawer hidden">
    <div class="drawer-backdrop" id="memoryBackdrop"></div>
    <div class="drawer-panel">
      <div class="drawer-header">
        <span>🧠 记忆</span>
        <button class="icon-btn" id="closeMemoryBtn">✕</button>
      </div>
      <div class="drawer-body">
        <button class="add-item-btn" id="addMemoryBtn">+ 添加记忆</button>
        <div id="memoryAddForm" class="memory-add-form hidden">
          <textarea id="memoryInput" placeholder="记录重要的事…" rows="3"></textarea>
          <div class="memory-form-row">
            <label class="pin-label">
              <input type="checkbox" id="memoryPinCheck"> 📌 置顶
            </label>
            <button id="saveMemoryBtn" class="save-mem-btn">保存</button>
          </div>
        </div>
        <div id="memoryList" class="memory-list"></div>
      </div>
    </div>
  </div>

  <!-- ── QUEUE DRAWER ────────────────────────────────────────────────────────── -->
  <div id="queueDrawer" class="drawer hidden">
    <div class="drawer-backdrop" id="queueBackdrop"></div>
    <div class="drawer-panel">
      <div class="drawer-header">
        <span>⚡ 生成队列</span>
        <button class="icon-btn" id="closeQueueBtn">✕</button>
      </div>
      <div class="drawer-body">
        <div id="queueEmpty" class="queue-empty">
          暂无生成任务<br><small>点击 📸 按钮生成角色表情图片</small>
        </div>
        <div id="queueList" class="queue-list"></div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
